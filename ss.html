<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>mmmmmmm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: #f0f2f5;
            padding: 60px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #222;
        }
        .options {
            margin: 30px 0;
        }
        .option-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            font-size: 18px;
            cursor: pointer;
        }
        .option-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }
        .btn {
            padding: 12px 30px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 25px;
            font-size: 18px;
            color: #007bff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>请选择你喜欢的水果</h1>
        <div class="options">
            <label class="option-item">
                <input type="radio" name="fruit" value="苹果" checked> 苹果
            </label>
            <label class="option-item">
                <input type="radio" name="fruit" value="香蕉"> 香蕉
            </label>
            <label class="option-item">
                <input type="radio" name="fruit" value="橙子"> 橙子
            </label>
            <label class="option-item">
                <input type="radio" name="fruit" value="西瓜"> 西瓜
            </label>
        </div>
        <button class="btn" onclick="showChoice()">确认选择</button>
        <div id="result"></div>
    </div>

    <script>
        function showChoice() {
            const selected = document.querySelector('input[name="fruit"]:checked').value;
            document.getElementById('result').textContent = `你选择了：${selected} `;
        }
    </script>
</body>
</html>
